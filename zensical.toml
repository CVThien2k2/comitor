# ============================================================================
# Zensical configuration for Comitor documentation
# ============================================================================

[project]
site_name = "Comitor"
site_description = "Tài liệu kiến trúc và vận hành hệ thống Comitor."
site_author = "Comitor Team"
copyright = """
Copyright &copy; 2026 The authors
"""

nav = [
  { "Trang chủ" = "index.md" },
  { "Business" = [
    { "Nghiệp vụ" = "simple/01-tong-quan-nghiep-vu-va-yeu-cau-he-thong-20260510.md" },
  ]},
  { "Architecture" = [
    { "Kiến trúc hệ thống" = "simple/02-kien-truc-he-thong-20260510.md" },
    { "Thiết kế Database" = "simple/09-thiet-ke-database-20260510.md" },
  ]},
  { "Technical" = [
    { "Trace & Idempotency" = "simple/03-trace-va-idempotency-20260510.md" },
    { "Quy chuẩn chung" = "simple/10-quy-chuan-request-response-message-20260510.md" },
    { "Tra cứu cấu hình môi trường" = "simple/04-tra-cuu-cau-hinh-moi-truong-20260510.md" },
    { "System Config & Security" = "simple/05-system-config-va-bao-mat-du-lieu-20260510.md" },
    { "Đồng bộ & Realtime" = "simple/06-dong-bo-va-realtime-20260510.md" },
    { "Error Code Reference" = "simple/07-error-code-reference-20260510.md" },
    { "Luồng hoạt động" = "simple/11-luong-hoat-dong-20260510.md" },
    { "Event Topic Reference" = "simple/event-topic-reference-20260510.md" },
  ]},
  { "Testing" = [
    { "Test Strategy & Cases" = "simple/08-test-strategy-va-cases-20260510.md" },
  ]},
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
