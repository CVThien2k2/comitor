name: Docker build and deploy (self-hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'deploy')))
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Pull code, build images, start stack
        run: |
          set -euo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"
          REF="${{ github.ref_name }}"
          git fetch origin "$REF"
          git checkout "$REF"
          git pull --ff-only origin "$REF"
          docker compose build
          docker compose up -d --remove-orphans
