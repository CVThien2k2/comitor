services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: backend-runner
    container_name: comitor-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - apps/backend/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      REDIS_USERNAME: default
      REDIS_PASSWORD: ${REDIS_PASSWORD:-comitor_redis_password}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-comitor_redis_password}@redis:6379
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: web-runner
    container_name: comitor-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: comitor-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-comitor_redis_password}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-comitor_redis_password}"]
    ports:
      - "6379:6379"

volumes:
  postgres_data:
