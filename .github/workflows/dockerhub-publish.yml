name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        include:
          - image_name: comitor-backend
            dockerfile: ./apps/backend/Dockerfile
            build_args: ""
          - image_name: comitor-web
            dockerfile: ./apps/web/Dockerfile
            build_args: |
              NEXT_PUBLIC_ENV=${{ vars.NEXT_PUBLIC_ENV }}
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
              NEXT_PUBLIC_ZALO_OA_REQUEST_PERMISSION_APP_URL=${{ vars.NEXT_PUBLIC_ZALO_OA_REQUEST_PERMISSION_APP_URL }}
              NEXT_PUBLIC_META_REDIRECT_URI=${{ vars.NEXT_PUBLIC_META_REDIRECT_URI }}
              NEXT_PUBLIC_META_APP_ID=${{ vars.NEXT_PUBLIC_META_APP_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: [self-hosted, linux, x64]
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy locally on self-hosted runner
        run: |
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
